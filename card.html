<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали новости - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ДЕТАЛИ НОВОСТИ -->
    <section class="card-detail-section">
        <div class="card-detail-container">
            <!-- Изображение -->
            <img src="https://images.unsplash.com/photo-1618477461853-5f8dd68aa395?w=800" alt="" class="card-detail-image" id="cardImage">
            
            <!-- Заголовок -->
            <h1 class="card-detail-title" id="cardTitle">Заголовок новости</h1>
            
            <!-- Контент -->
            <div class="card-detail-content" id="cardContent">
                Содержание новости...
            </div>
            
            <!-- Действия -->
            <div class="card-detail-actions">
                <a href="catalog.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
                <a href="donate.html" class="btn-charity">
                    <i class="fas fa-heart"></i> Благотворительность
                </a>
            </div>
        </div>
    </section>

    <!-- КОММЕНТАРИИ -->
    <section class="section" style="background-color: #FCFCFC;">
        <div class="container">
            <div class="comments-section">
                <h3 class="comments-title">Комментарии</h3>
                
                <!-- Форма комментария (только для авторизованных) -->
                <div id="commentForm" class="comment-form hidden">
                    <textarea id="commentText" placeholder="Напишите ваш комментарий..."></textarea>
                    <button onclick="addComment(event)">
                        <i class="fas fa-paper-plane"></i> Отправить
                    </button>
                </div>
                
                <!-- Приглашение войти -->
                <div id="loginPrompt" class="login-prompt">
                    <p>
                        <i class="fas fa-lock"></i> 
                        Чтобы оставить комментарий, пожалуйста, 
                        <a href="login.html">войдите в систему</a>
                    </p>
                </div>
                
                <!-- Список комментариев -->
                <div id="commentsList">
                    <p class="text-center">Пока нет комментариев. Будьте первым!</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script src="card.js"></script>
    <script>
        // Загружаем данные карточки при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadCardDetail);
    </script>
</body>
</html>
