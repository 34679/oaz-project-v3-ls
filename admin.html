<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администратор - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin-projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="manage-news.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <!-- Заполняется через JavaScript -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- СТРАНИЦА АДМИНИСТРАТОРА -->
    <section class="admin-section">
        <div class="container">
            <!-- Заголовок -->
            <div class="admin-header">
                <div class="admin-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="profile-name" style="color: white;">Администратор</div>
            </div>
            
            <h2 class="admin-title">Управление</h2>
            
            <!-- Кнопки управления -->
            <div class="admin-buttons">
                <a href="admin-projects.html" class="admin-btn">
                    <i class="fas fa-project-diagram"></i> Управление проектами
                </a>
                <a href="manage-news.html" class="admin-btn">
                    <i class="fas fa-newspaper"></i> Редактировать каталог новостей
                </a>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script>
        // Инициализация админки при загрузке
        document.addEventListener('DOMContentLoaded', async function() {
            // Ждем инициализации API
            await new Promise(resolve => setTimeout(resolve, 100));
            
            if (!AppState.currentUser || AppState.currentUser.role !== 'admin') {
                window.location.href = 'login.html';
                return;
            }
            updateAuthUI();
        });
    </script>
</body>
</html>
