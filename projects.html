<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .projects-section {
            padding: 40px 0;
            background-color: var(--white);
            min-height: 100vh;
        }
        
        .project-card {
            background-color: var(--white);
            border: 3px dashed var(--black);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        
        .project-card:hover {
            border-color: var(--accent-pink);
            box-shadow: 0 5px 20px rgba(247, 86, 124, 0.2);
        }
        
        .project-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: var(--black);
        }
        
        .project-info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px dashed #ddd;
        }
        
        .project-info-row:last-of-type {
            border-bottom: none;
        }
        
        .project-info-label {
            font-weight: 500;
            color: #666;
        }
        
        .project-info-value {
            font-weight: bold;
            color: var(--black);
        }
        
        .project-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-planned {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-completed {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        
        .project-dates {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #ddd;
            font-size: 0.9rem;
            color: #666;
        }
        
        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-project {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-join {
            background-color: var(--black);
            color: var(--white);
        }
        
        .btn-join:hover {
            background-color: var(--accent-pink);
            color: var(--white);
        }
        
        .btn-join:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        .btn-details {
            background-color: var(--white);
            color: var(--black);
            border: 2px solid var(--black);
        }
        
        .btn-details:hover {
            background-color: var(--primary-blue);
            color: var(--white);
            border-color: var(--primary-blue);
        }
        
        .btn-donate {
            background-color: var(--accent-pink);
            color: var(--white);
        }
        
        .btn-donate:hover {
            background-color: #e0456a;
            color: var(--white);
        }
        
        .progress-bar-container {
            margin: 15px 0;
        }
        
        .progress {
            height: 20px;
            border-radius: 10px;
            background-color: #e9ecef;
        }
        
        .progress-bar {
            background-color: var(--accent-pink);
            border-radius: 10px;
        }
        
        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 5px;
            color: #666;
        }
        
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 10px 25px;
            border: 2px solid var(--primary-blue);
            background-color: var(--white);
            color: var(--black);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .filter-tab.active {
            background-color: var(--accent-pink);
            border-color: var(--accent-pink);
            color: var(--white);
        }
        
        .filter-tab:hover {
            background-color: var(--primary-blue);
            color: var(--white);
        }
    </style>
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ПРОЕКТЫ -->
    <section class="projects-section">
        <div class="container">
            <h2 class="section-title">Проекты</h2>
            
            <!-- Фильтры -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">Все</button>
                <button class="filter-tab" data-filter="active">Текущие</button>
                <button class="filter-tab" data-filter="planned">Запланированные</button>
                <button class="filter-tab" data-filter="completed">Завершенные</button>
            </div>
            
            <!-- Сетка проектов -->
            <div class="row" id="projectsGrid">
                <!-- Проекты загружаются через JavaScript -->
            </div>
        </div>
    </section>

    <!-- Модальное окно подтверждения -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Вы уверены, что хотите присоединиться к проекту?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn" style="background-color: #F7567C; border: none;">Да</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script src="projects.js"></script>
</body>
</html>
