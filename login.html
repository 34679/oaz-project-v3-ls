<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ВХОД -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <h2 class="auth-title">Вход</h2>
                
                <form class="auth-form" onsubmit="login(event)">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="Почта" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                    </div>
                    
                    <button type="submit" class="btn-auth">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                </form>
                
                <div class="auth-switch">
                    <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
                </div>
                
                <!-- Подсказка для администратора -->
                <div style="margin-top: 30px; padding: 15px; background-color: #f8f9fa; border-radius: 10px; text-align: center;">
                    <small style="color: #666;">
                        <i class="fas fa-info-circle"></i> 
                        Для входа как администратор:<br>
                        Email: admin@oaz-ocean.ru<br>
                        Пароль: admin123
                    </small>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script>
        // Перенаправление после входа
        document.addEventListener('DOMContentLoaded', async function() {
            // Ждем инициализации API
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
            if (redirectUrl && AppState.currentUser) {
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectUrl;
            }
        });
    </script>
</body>
</html>
