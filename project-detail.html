<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали проекта - ОАЗ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .project-detail-section {
            padding: 40px 0;
            background-color: var(--white);
            min-height: 100vh;
        }
        
        .project-detail-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .project-detail-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--black);
        }
        
        .project-detail-description {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }
        
        .project-info-card {
            background-color: var(--primary-blue);
            border-radius: 20px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
        }
        
        .project-info-card h4 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .project-info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
        }
        
        .project-info-row:last-child {
            border-bottom: none;
        }
        
        .progress-bar-container {
            margin: 20px 0;
        }
        
        .progress {
            height: 25px;
            border-radius: 15px;
            background-color: rgba(255,255,255,0.3);
        }
        
        .progress-bar {
            background-color: var(--accent-pink);
            border-radius: 15px;
        }
        
        .project-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn-project-action {
            flex: 1;
            min-width: 200px;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-join-project {
            background-color: var(--accent-pink);
            color: white;
        }
        
        .btn-join-project:hover {
            background-color: #e0456a;
            color: white;
        }
        
        .btn-donate-project {
            background-color: var(--black);
            color: white;
        }
        
        .btn-donate-project:hover {
            background-color: var(--accent-pink);
            color: white;
        }
        
        .btn-back-project {
            background-color: white;
            color: var(--black);
            border: 2px solid var(--black);
        }
        
        .btn-back-project:hover {
            background-color: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .status-active {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-planned {
            background-color: #fff3cd;
            color: #856404;
        }
        
        .status-completed {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <!-- НАВИГАЦИЯ -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-water" style="color: #A0CDFF;"></i> ОА<span>З</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projects.html">Проекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="donate.html">Благотворительность</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="catalog.html">Новости</a>
                    </li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="fas fa-sign-in-alt"></i> Вход/Регистрация
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ДЕТАЛИ ПРОЕКТА -->
    <section class="project-detail-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <!-- Изображение -->
                    <img src="" alt="" class="project-detail-image" id="projectImage">
                    
                    <!-- Заголовок и описание -->
                    <h1 class="project-detail-title" id="projectTitle">Название проекта</h1>
                    <p class="project-detail-description" id="projectDescription">Описание проекта</p>
                    
                    <!-- Полное описание -->
                    <div id="projectFullDescription">
                        <!-- Загружается через JS -->
                    </div>
                </div>
                
                <div class="col-lg-4">
                    <!-- Информация о проекте -->
                    <div class="project-info-card">
                        <h4><i class="fas fa-info-circle"></i> Информация о проекте</h4>
                        
                        <div class="progress-bar-container">
                            <div class="progress">
                                <div class="progress-bar" id="projectProgress" style="width: 0%"></div>
                            </div>
                            <div class="text-center mt-2">
                                <span id="projectAmounts">0 / 0 руб.</span>
                            </div>
                        </div>
                        
                        <div class="project-info-row">
                            <span><i class="fas fa-calendar-alt"></i> Начало:</span>
                            <span id="projectStartDate">-</span>
                        </div>
                        <div class="project-info-row">
                            <span><i class="fas fa-calendar-check"></i> Окончание:</span>
                            <span id="projectEndDate">-</span>
                        </div>
                        <div class="project-info-row">
                            <span><i class="fas fa-clock"></i> Часы:</span>
                            <span id="projectHours">0 ч.</span>
                        </div>
                        <div class="project-info-row">
                            <span><i class="fas fa-users"></i> Участники:</span>
                            <span id="projectParticipants">0</span>
                        </div>
                        <div class="project-info-row">
                            <span><i class="fas fa-info-circle"></i> Статус:</span>
                            <span class="status-badge" id="projectStatus">-</span>
                        </div>
                    </div>
                    
                    <!-- Действия -->
                    <div class="project-actions">
                        <button class="btn-project-action btn-join-project" id="joinBtn" onclick="handleJoinProject()">
                            <i class="fas fa-hands-helping"></i> Присоединиться
                        </button>
                        <button class="btn-project-action btn-donate-project" id="donateBtn" onclick="handleDonateProject()">
                            <i class="fas fa-heart"></i> Задонатить
                        </button>
                        <a href="projects.html" class="btn-project-action btn-back-project">
                            <i class="fas fa-arrow-left"></i> Назад
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Модальное окно подтверждения -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Подтверждение</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmMessage">Вы уверены?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="confirmActionBtn" style="background-color: #F7567C; border: none;">Да</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- API Client -->
    <script src="api-client.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script src="project-detail.js"></script>
</body>
</html>
